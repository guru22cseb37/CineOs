name: CineOS CI Pipeline
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci

    - name: Turbo Lint
      run: npx turbo run lint

    - name: Turbo Typecheck
      run: npx turbo run typecheck
      
    - name: Build
      run: npx turbo run build
      
    - name: Integration tests check (Placeholder)
      run: echo "Run Vitest/Playwright here"
